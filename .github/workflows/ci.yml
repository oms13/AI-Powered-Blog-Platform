name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build
        env:
          VITE_API_URL: https://example.com

  backend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

  docker-build:
    runs-on: ubuntu-latest

    needs:
      - frontend-build
      - backend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Frontend Docker Image
        run: |
          docker build \
          --build-arg VITE_API_URL=https://example.com \
          -t blog-client ./client

      - name: Build Backend Docker Image
        run: |
          docker build \
          -t blog-server ./server