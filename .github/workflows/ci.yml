name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build
        env:
          VITE_API_URL: https://example.com

  backend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

  docker-build-and-push:
    runs-on: ubuntu-latest

    needs:
      - frontend-build
      - backend-build

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Frontend Image
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t ghcr.io/oms13/ai-powered-blog-platform-client:latest \
            ./client

      - name: Push Frontend Image
        run: |
          docker push ghcr.io/oms13/ai-powered-blog-platform-client:latest

      - name: Build Backend Image
        run: |
          docker build \
            -t ghcr.io/oms13/ai-powered-blog-platform-server:latest \
            ./server

      - name: Push Backend Image
        run: |
          docker push ghcr.io/oms13/ai-powered-blog-platform-server:latest

      - name: Trigger Backend Deployment 
        if: github.ref == 'refs/heads/main' 
        run: curl -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" 
      - name: Trigger Frontend Deployment 
        if: github.ref == 'refs/heads/main' 
        run: curl -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"